name: Fetch GA Data

on:
  schedule:
    # 每天 UTC 22:17（北京时间次日 06:17）运行；避开整点高峰
    - cron: '12 15 * * *'
  workflow_dispatch: {}   # 支持在 Actions 页面手动触发

permissions:
  contents: write   # 允许把 ga-data.json 提交回本仓库

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Fetch GA data
        env:
          GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
          GA_SA_KEY: ${{ secrets.GA_SA_KEY }}
          GA_DAYS: '30'
          GA_TOP_N: '10'
        run: node fetch-ga.js

      - name: Commit ga-data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ga-data.json
          if git diff --staged --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "chore: update ga-data.json"
            git push
          fi
